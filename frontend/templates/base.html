{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}PharmaComm AI{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/clients.css' %}">
    <link rel="stylesheet" href="{% static 'css/campaigns.css' %}">
    <link rel="stylesheet" href="{% static 'css/ai.css' %}">
    <link rel="stylesheet" href="{% static 'css/meetings.css' %}">
    <link rel="stylesheet" href="{% static 'css/audit.css' %}">
    <link rel="stylesheet" href="{% static 'css/templates.css' %}">
    <link rel="stylesheet" href="{% static 'css/calendar.css' %}">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container-fluid">

            <!-- Logo -->

            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
                💊 PulseAI
            </a>

            <!-- Mobile Button -->

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- LEFT NAVIGATION -->

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'clients' %}">
                            Clients
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'campaigns' %}">
                            Campaigns
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'templates' %}">
                            Templates
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ai_chat' %}">
                            AI Copilot
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'meetings' %}">
                            Meetings
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'audit' %}">
                            Audit Logs
                        </a>
                    </li>

                </ul>

                <!-- RIGHT SIDE -->

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item me-3">

                        <span class="navbar-text text-white">

                            <i class="bi bi-person-circle fs-5"></i>

                            Turvi

                        </span>

                    </li>

                    <li class="nav-item">

                        <a href="{% url 'login' %}" class="btn btn-light btn-sm" id="logoutBtn">
                            Logout 
                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= PAGE CONTENT ================= -->

    <main class="container mt-4">

        {% block content %}

        {% endblock %}

    </main>

    <!-- ================= FOOTER ================= -->

    <footer class="text-center mt-5 py-4 border-top">

        <small class="text-white">
    © 2026 PharmaComm AI | Enterprise Communication Copilot
    </small>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    {% load static %}
<script src="{% static 'js/main.js' %}"></script>
<script src="{% static 'js/dashboard.js' %}"></script>
<script src="{% static 'js/calendar.js' %}"></script>
<script src="{% static 'js/clients.js' %}"></script>
<script src="{% static 'js/campaigns.js' %}"></script>
<script src="{% static 'js/ai.js' %}"></script>
<script src="{% static 'js/meetings.js' %}"></script>
<script src="{% static 'js/audit.js' %}"></script>




</body>
</html>
